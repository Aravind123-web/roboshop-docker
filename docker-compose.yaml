
networks:
  default:
    external: true
    name: roboshop

services:
  mongodb:
    image: mongodb:v1

  catalogue:
    image: catalogue:v2
    depends_on:
      - mongodb

  web:
    image: web:v3
    ports:
      - "80:80"
    depends_on:
      - catalogue

  redis:
    image: redis

  user:
    image: user:v5
    environment:
      MONGO: "true"
      MONGO_URL: "mongodb://mongodb:27017/users"
      REDIS_HOST: "redis"
    depends_on:
      - redis
      - mongodb

  cart:
    image: cart:v4
    depends_on:
      - redis
      - catalogue
``

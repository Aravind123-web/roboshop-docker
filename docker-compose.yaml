networks:
  default:
    external: true
    name: roboshop
services:
  # docker run -d --name mongodb --network=roboshop mongodb:v1
  mongodb:
    image: mongodb:v1
    #networks:
    #  - roboshop
  # docker run -d --name catalogue --network=roboshop catalogue:v2
  catalogue:
    image: catalogue:v2
    #networks:
    #  - roboshop
    depends_on:
      - mongodb
  # docker run -d -p 80:80 --name web --network=roboshop web:v3
  web:
    image: web:v3
    ports:
      - "80:80"
   # networks:
    #  - roboshop
    depends_on:
      - catalogue     
  redis:
    imgae: redis
  user:
    image: user:v4
    depends_on:
    - redis
    - mongodb
  cart:
    image: cart:v5
    depends_on:
    - redis
    - catalogue